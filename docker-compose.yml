services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage_pass
      POSTGRES_DB: transaction_triage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d transaction_triage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: